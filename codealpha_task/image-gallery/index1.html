<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Image Gallery</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

<h1>Image Gallery</h1>
<div class="buttons">
  <button data-filter="all">All</button>
  <button data-filter="bag">Bag</button>
  <button data-filter="camera">camera</button>
  <button data-filter="watch">watch</button>
  <button data-filter="headphone">headphone</button>
  <button data-filter="shoes">shoes</button>
</div>
<div class="gallery">
  <div class="item bag"><img src="image1/bag1.png"></div>
  <div class="item bag"><img src="image1/bag2.png"></div>
<div class="item bag"><img src="image1/bag3.png"></div>
  <div class="item camera"><img src="image1/camera1.png"></div>
  <div class="item camera"><img src="image1/camera2.png"></div>
  <div class="item camera"><img src="image1/camera3.png"></div>
  <div class="item watch"><img src="image1/watch1.png"></div>
  <div class="item watch"><img src="image1/watch2.png"></div>
  <div class="item watch"><img src="image1/watch3.png"></div>
  <div class="item headphone"><img src="image1/headphone1.png"></div>
  <div class="item headphone"><img src="image1/headphone2.png"></div>
  <div class="item headphone"><img src="image1/headphone3.png"></div>
  <div class="item shoes"><img src="image1/shoes1.png"></div>
  <div class="item shoes"><img src="image1/shoes2.png"></div>
<div class="lightbox" id="lightbox">

  <span class="close">&times;</span>
  <img id="lightbox-img">
  <button id="prev">Prev</button>
  <button id="next">Next</button>
</div>

<script src="script1.js"></script>
</body>
</html>
